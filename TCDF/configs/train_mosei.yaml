base:
  seed: 1111
  batch_size: 64
  n_epochs: 200
  num_workers: 8
  train_mode: regression
  missing_rate_eval_test: 0.5
  do_validation: true

  # TCDF losses
  lambda_tdc: 0.1
  lambda_dcr: 0.1

dataset:
  datasetName: mosei
  dataPath: /home/qluai/JHP/dataset/CMU-MOSEI/Processed/unaligned_50.pkl

optimizer:
  lr: 0.0001
  weight_decay: 0.0001
  bert_lr_scale: 0.1

model:
  feature_extractor:
    bert_pretrained: 'bert-base-uncased'
    input_length: [50, 500, 500]   # language, video, audio
    token_length: [8, 8, 8]        # language, video, audio
    heads: 8
    input_dims: [768, 35, 74]      # language, video, audio
    hidden_dims: [128, 128, 128]   # language, video, audio
    depth: 2

  prediction:
    out_dim: 1

  ddl:
    queue_size: 512
    momentum: 0.99

  tcmr:
    hidden_dim: 256
    dropout: 0.1

  qagf:
    fusion_hidden_dim: 256
    dropout: 0.1
