base:
  seed: 1111
  batch_size: 64
  n_epochs: 200
  num_workers: 8
  train_mode: regression
  missing_rate_eval_test: 0.5
  do_validation: true

  # TCDF losses
  lambda_tdc: 0.05
  lambda_dcr: 1.0

dataset:
  datasetName: mosi
  dataPath: /home/qluai/JHP/dataset/CMU-MOSI/Processed/unaligned_50.pkl

optimizer:
  lr: 0.0001
  weight_decay: 0.0001
  bert_lr_scale: 0.1

model:
  feature_extractor:
    bert_pretrained: 'bert-base-uncased'
    input_length: [50, 500, 375]   # language, video, audio
    token_length: [8, 8, 8]
    heads: 8
    input_dims: [768, 20, 5]
    hidden_dims: [128, 128, 128]
    depth: 2

  prediction:
    out_dim: 1

  ddl:
    queue_size: 128
    momentum: 0.99
    warmup_count: 64

  tcmr:
    hidden_dim: 256
    dropout: 0.1

  qagf:
    fusion_hidden_dim: 256
    dropout: 0.1
